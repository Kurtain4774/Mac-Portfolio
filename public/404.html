<!doctype html>
<html>
  <head>
    <meta charset="UTF-8">
    <script>
      // GitHub Pages SPA fallback: redirect 404 back to index.html
      const path = window.location.pathname;
      const base = '/Gavin-Portfolio';
      const rest = path.startsWith(base) ? path.slice(base.length) : path;
      sessionStorage.setItem('spa-redirect', rest);
      window.location.replace(base + '/');
    </script>
  </head>
  <body></body>
</html>
